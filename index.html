<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>默寫大挑戰 Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --main: #4A90E2; --success: #2ECC71; --bg: #F0F2F5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 15px; touch-action: manipulation; }
        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); width: 100%; max-width: 380px; text-align: center; }
        .q-img { width: 120px; height: 120px; object-fit: contain; border-radius: 12px; margin-bottom: 8px; background: #fff; border: 1px solid #eee; }
        .zh-text { font-size: 24px; font-weight: bold; color: #333; margin: 2px 0; }
        .star-display { color: #F1C40F; font-size: 16px; margin-bottom: 10px; font-weight: bold; }
        .audio-btn { background: #FF9F43; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; margin: 5px 0; box-shadow: 0 4px 0 #d38336; }
        .answer-box { font-size: 32px; font-weight: bold; letter-spacing: 4px; margin: 15px 0; min-height: 40px; color: var(--main); border-bottom: 3px solid #eee; width: 100%; text-transform: lowercase; }
        
        /* 標準 QWERTY 鍵盤樣式 */
        .keyboard-container { width: 100%; margin-top: 10px; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .key { background: white; border: 1px solid #ccc; border-radius: 5px; padding: 12px 0; flex: 1; max-width: 32px; font-size: 18px; font-weight: bold; box-shadow: 0 3px 0 #ddd; -webkit-tap-highlight-color: transparent; }
        .key:active { background: #e0e0e0; transform: translateY(2px); box-shadow: none; }
        
        .footer-btns { display: flex; gap: 8px; width: 100%; margin-top: 10px; }
        .f-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; color: white; cursor: pointer; }
        .btn-del { background: #95a5a6; }
        .btn-hint { background: #9B59B6; }

        .admin-section { margin-top: 20px; width: 100%; max-width: 380px; background: #e9ecef; padding: 15px; border-radius: 15px; text-align: left; box-sizing: border-box; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .add-btn { width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 8px; margin-top: 5px; font-weight: bold; }
        #feedback { font-size: 60px; position: fixed; top: 25%; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <div class="card">
        <div class="star-display">🌟 星星: <span id="stars">0</span> | 詞庫: <span id="total">0</span></div>
        <div id="pic"></div>
        <div class="zh-text" id="zh"></div>
        <button class="audio-btn" onclick="speak()">🔊</button>
        <div class="answer-box" id="ans"></div>
        
        <div class="keyboard-container" id="kb"></div>

        <div class="footer-btns">
            <button class="f-btn btn-del" onclick="del()">刪除字母</button>
            <button class="f-btn btn-hint" onclick="hint()">給我提示</button>
        </div>
    </div>

    <div class="admin-section">
        <h4 style="margin:0;">家長管理：新增單詞</h4>
        <input type="text" id="newEn" placeholder="英文單詞">
        <input type="text" id="newZh" placeholder="中文翻譯">
        <button class="add-btn" onclick="addNew()">存入手機</button>
        <button onclick="resetData()" style="background:none; border:none; color:red; font-size:11px; text-decoration:underline; margin-top:10px; width:100%;">清空所有自加單詞</button>
    </div>

    <div id="feedback"></div>
    <audio id="sWin" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="sLose" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

    <script>
        const defaults = [{en:'bee',zh:'蜜蜂'},{en:'ant',zh:'螞蟻'},{en:'bird',zh:'小鳥'},{en:'tree',zh:'樹木'},{en:'sky',zh:'天空'}];
        const qwerty = ["qwertyuiop", "asdfghjkl", "zxcvbnm"];
        let words = [], cur = {}, input = "", stars = 0;

        function load() {
            const saved = localStorage.getItem('mySpellingWordsV2');
            words = saved ? JSON.parse(saved) : [...defaults];
            if(!saved) localStorage.setItem('mySpellingWordsV2', JSON.stringify(words));
            renderKeyboard();
            next();
        }

        function renderKeyboard() {
            const kbContainer = document.getElementById('kb');
            kbContainer.innerHTML = '';
            qwerty.forEach(rowString => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'kb-row';
                rowString.split('').forEach(char => {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    btn.innerText = char;
                    btn.onclick = () => type(char);
                    rowDiv.appendChild(btn);
                });
                kbContainer.appendChild(rowDiv);
            });
        }

        function speak() {
            const u = new SpeechSynthesisUtterance(cur.en);
            u.lang = 'en-US'; u.rate = 0.7; window.speechSynthesis.speak(u);
        }

        function next() {
            input = ""; document.getElementById('feedback').innerText = "";
            document.getElementById('total').innerText = words.length;
            cur = words[Math.floor(Math.random() * words.length)];
            document.getElementById('zh').innerText = cur.zh;
            document.getElementById('pic').innerHTML = `<img src="https://source.unsplash.com/400x400/?${cur.en}" class="q-img" onclick="speak()">`;
            renderAnswer();
            setTimeout(speak, 600);
        }

        function renderAnswer() {
            let res = "";
            for(let i=0; i<cur.en.length; i++) res += (input[i] || "_") + " ";
            document.getElementById('ans').innerText = res.trim();
        }

        function type(l) {
            if(input.length < cur.en.length) {
                input += l; renderAnswer();
                if(input.length === cur.en.length) check();
            }
        }

        function check() {
            if(input.toLowerCase() === cur.en.toLowerCase()) {
                document.getElementById('feedback').innerText = "🎈🎉";
                document.getElementById('sWin').play();
                stars++; document.getElementById('stars').innerText = stars;
                setTimeout(next, 2000);
            } else {
                document.getElementById('feedback').innerText = "❌";
                document.getElementById('sLose').play();
                setTimeout(() => { document.getElementById('feedback').innerText = ""; input = ""; renderAnswer(); }, 1000);
            }
        }

        function del() { input = input.slice(0,-1); renderAnswer(); }
        function hint() { if(input.length < cur.en.length) type(cur.en[input.length].toLowerCase()); }

        function addNew() {
            const en = document.getElementById('newEn').value.trim().toLowerCase();
            const zh = document.getElementById('newZh').value.trim();
            if(en && zh) {
                words.push({en, zh});
                localStorage.setItem('mySpellingWordsV2', JSON.stringify(words));
                alert("已成功加入！");
                document.getElementById('newEn').value = "";
                document.getElementById('newZh').value = "";
                next();
            }
        }

        function resetData() {
            if(confirm("確定要重設嗎？")) {
                localStorage.removeItem('mySpellingWordsV2');
                location.reload();
            }
        }

        window.onload = load;
    </script>
</body>
</html>
