<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>默寫大挑戰</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --win-color: #2ECC71; --primary: #4A90E2; }
        body { font-family: -apple-system, sans-serif; background: #F0F4F8; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; touch-action: manipulation; }
        .card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); width: 100%; max-width: 360px; text-align: center; }
        .q-img { width: 150px; height: 150px; object-fit: contain; border-radius: 15px; margin-bottom: 10px; background: #f9f9f9; }
        .zh-text { font-size: 26px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .star-display { color: #F1C40F; font-size: 18px; margin-bottom: 15px; }
        .audio-btn { background: #FF9F43; color: white; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 30px; margin: 10px 0; box-shadow: 0 4px 0 #d38336; cursor: pointer; }
        .audio-btn:active { transform: translateY(2px); box-shadow: none; }
        .answer-box { font-size: 40px; font-weight: bold; letter-spacing: 6px; margin: 20px 0; min-height: 50px; color: var(--primary); border-bottom: 3px solid #eee; width: 100%; text-transform: lowercase; }
        .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; }
        .key { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 14px 0; font-size: 18px; font-weight: bold; box-shadow: 0 3px 0 #eee; }
        .key:active { background: #f0f0f0; transform: translateY(2px); box-shadow: none; }
        .footer-btns { display: flex; gap: 10px; width: 100%; margin-top: 20px; }
        .f-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 14px; }
        .btn-del { background: #ecf0f1; color: #7f8c8d; }
        .btn-hint { background: #9B59B6; color: white; }
        #feedback { font-size: 60px; position: fixed; top: 30%; pointer-events: none; }
    </style>
</head>
<body>

    <div class="card">
        <div class="star-display">🌟 獲得星星: <span id="stars">0</span></div>
        <div id="pic"></div>
        <div class="zh-text" id="zh"></div>
        <button class="audio-btn" onclick="speak()">🔊</button>
        <div class="answer-box" id="ans"></div>
        <div class="keyboard" id="kb"></div>
        <div class="footer-btns">
            <button class="f-btn btn-del" onclick="del()">刪除字母</button>
            <button class="f-btn btn-hint" onclick="hint()">給個提示</button>
        </div>
    </div>
    <div id="feedback"></div>

    <audio id="sWin" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="sLose" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

    <script>
        const defaults = [{en:'bee',zh:'蜜蜂'},{en:'bird',zh:'小鳥'},{en:'tree',zh:'樹木'},{en:'sky',zh:'天空'},{en:'ant',zh:'螞蟻'}];
        let words = [], cur = {}, input = "", stars = 0;

        function load() {
            // 自動同步「練習版」的新增單詞
            const saved = localStorage.getItem('mySpellingWordsV2');
            words = saved ? JSON.parse(saved) : [...defaults];
            next();
        }

        function speak() {
            const u = new SpeechSynthesisUtterance(cur.en);
            u.lang = 'en-US'; u.rate = 0.7;
            window.speechSynthesis.speak(u);
        }

        function next() {
            input = ""; 
            document.getElementById('feedback').innerText = "";
            cur = words[Math.floor(Math.random() * words.length)];
            document.getElementById('zh').innerText = cur.zh;
            document.getElementById('pic').innerHTML = `<img src="https://source.unsplash.com/400x400/?${cur.en}" class="q-img">`;
            render();
            setTimeout(speak, 500);
        }

        function render() {
            let res = "";
            for(let i=0; i<cur.en.length; i++) res += (input[i] || "_") + " ";
            document.getElementById('ans').innerText = res.trim();
        }

        function type(l) {
            if(input.length < cur.en.length) {
                input += l; render();
                if(input.length === cur.en.length) check();
            }
        }

        function check() {
            if(input.toLowerCase() === cur.en.toLowerCase()) {
                document.getElementById('feedback').innerText = "🎈";
                document.getElementById('sWin').play();
                stars++; document.getElementById('stars').innerText = stars;
                setTimeout(next, 2000);
            } else {
                document.getElementById('feedback').innerText = "❌";
                document.getElementById('sLose').play();
                setTimeout(() => { document.getElementById('feedback').innerText = ""; input = ""; render(); }, 1000);
            }
        }

        function del() { input = input.slice(0,-1); render(); }
        function hint() { type(cur.en[input.length].toLowerCase()); }

        const kb = document.getElementById('kb');
        "abcdefghijklmnopqrstuvwxyz".split('').forEach(l => {
            const b = document.createElement('button');
            b.className = 'key'; b.innerText = l;
            b.onclick = () => type(l);
            kb.appendChild(b);
        });

        window.onload = load;
    </script>
</body>
</html>
